<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREE - Lucky Spin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#0f172a;background-image:url("https://i.ibb.co/d0Rj3zmn/image.png");background-size:cover;background-position:center}

.hero{min-height:30vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px 15px}
.hero h1{font-size:28px;margin-bottom:10px}
.hero p{font-size:14px;margin-bottom:20px}

.neon-text{color:#fff;text-shadow:0 0 8px #00f7ff}

.btn{padding:10px 22px;background:linear-gradient(45deg,#ff416c,#ff4b2b);border-radius:50px;color:#fff;text-decoration:none;font-weight:600;display:inline-block;border:none}

.btn:disabled{opacity:.5;cursor:not-allowed}

.lucky-spin{text-align:center;margin:20px 10px}
.wheel-container{margin:15px auto;max-width:260px;width:100%;aspect-ratio:1/1;position:relative}

.pointer{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
border-left:12px solid transparent;
border-right:12px solid transparent;
border-bottom:24px solid #ffdd00;
}

footer{text-align:center;padding:15px;font-size:13px;opacity:.6}
</style>

</head>

<body>

<section class="hero">
<h1 class="neon-text">SPIN WHEEL HADIAH!</h1>
<p class="neon-text">Hanya 1x kesempatan</p>
</section>

<section class="lucky-spin">
<div class="wheel-container">
<div class="pointer"></div>
<canvas id="wheel"></canvas>
</div>

<button id="spin-btn" class="btn">PUTAR</button>

<p id="result" class="neon-text" style="margin-top:10px"></p>
</section>

<footer>© 2026</footer>

<script>
document.addEventListener("DOMContentLoaded",function(){

const c=document.getElementById("wheel"),
x=c.getContext("2d"),
btn=document.getElementById("spin-btn"),
result=document.getElementById("result");

const seg=["10 RB","500 RB","100 RB","FREE","1JT","20 RB"],
col=["#ff4b2b","#ff416c","#00f7ff","#39ff14","#b026ff","#ffdd00"];

let a=0,s=false;

/* CEK SUDAH SPIN */
if(localStorage.getItem("sudah_spin")){
btn.disabled=true;
result.innerHTML="⚠️ Kamu sudah menggunakan kesempatan spin";
}

function resize(){
c.width=c.offsetWidth;
c.height=c.offsetWidth;
}
resize();

function draw(){
let ctr=c.width/2,r=ctr,arc=2*Math.PI/seg.length;
x.clearRect(0,0,c.width,c.height);

for(let i=0;i<seg.length;i++){
x.beginPath();
x.fillStyle=col[i];
x.moveTo(ctr,ctr);
x.arc(ctr,ctr,r,a+i*arc,a+(i+1)*arc);
x.fill();

x.save();
x.translate(ctr,ctr);
x.rotate(a+i*arc+arc/2);
x.fillStyle="#000";
x.font=`${Math.floor(r/7)}px sans-serif`;
x.textAlign="right";
x.fillText(seg[i],r-10,5);
x.restore();
}
}
draw();

btn.onclick=function(){
if(s||localStorage.getItem("sudah_spin"))return;
s=true;

/* SIMPAN STATUS */
localStorage.setItem("sudah_spin","1");

let dur=2000,start=null,spin=3000+Math.random()*2000;

function anim(t){
if(!start)start=t;
let p=t-start;

a+=(spin/2000)*(Math.PI/180);
draw();

if(p<dur)requestAnimationFrame(anim);
else{
let deg=(a*180/Math.PI+90)%360;
let i=Math.floor((360-deg)/(360/seg.length))%seg.length;

result.innerHTML="🎉 Kamu dapat: <b>"+seg[i]+"</b>";
btn.disabled=true;

s=false;
}
}
requestAnimationFrame(anim);
};

});
</script>

</body>
</html>
